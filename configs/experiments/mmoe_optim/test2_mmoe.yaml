experiment:
  name: "focal_mmoe"

# =============================================================================
# 实验说明（配置级）
# - 模型形态: DeepFM + MMoE + ESMM(v2)
# - 训练目标: CTR + CTCVR（CVR 作为可选辅助损失）
# - 本文件仅定义实验参数；运行目录、日志、ckpt 由 Trainer 自动管理
# =============================================================================

# ESMM 总开关: true 时 loss 走 ESMM 分支（src/loss/bce.py::_compute_esmm）
use_esmm: true
esmm:
  # "v2"=标准 ESMM（p_ctcvr = p_ctr * p_cvr），"legacy" 为兼容旧语义
  version: "v2"
  # 数值稳定项（log-domain 计算与概率截断）
  eps: 1.0e-8
  # 总损失: lambda_ctr * L_ctr + lambda_ctcvr * L_ctcvr + lambda_cvr_aux * L_cvr_aux
  lambda_ctr: 1.0
  lambda_ctcvr: 5
  # 仅在有点击样本时生效的 CVR 辅助损失权重（click=1 子集）
  lambda_cvr_aux: 0.3

  residual:
    # ESMM 残差头（src/models/residual_head.py），用于 logit 空间修正 CTCVR
    # ctcvr_logit_res = detach(ctr_logit) + detach(cvr_logit) + residual_logit
    enabled: false
    # 兼容字段；当前构建逻辑按 CVR 分支表征接 residual，不依赖该字符串路由
    input: "mmoe_cvr"
    # true: residual 只更新 residual 分支；false: 允许梯度回传 shared/MMoE 表征
    stop_grad_input: true
    # ResidualHead MLP 结构
    mlp_dims: [64]
    dropout: 0.1
    use_layernorm: true
    # 输出为 alpha * tanh(.), 约束修正幅度在 [-alpha, +alpha]
    alpha: 1.0

    # L_res_reg = mean(r_logit^2) * res_reg_weight
    res_reg_weight: 5.0e-4

    # Anchor: MSE(ctcvr_logit_res, logit_mul) * weight，约束 residual 不偏离乘法基线
    anchor:
      enabled: false
      weight: 0.02
      eps: 1.0e-6

# ============================================================================
# Data
# - dataloader 输入: data/processed/{train|valid}
# - 负采样实际行为见 sampling.negative_sampling + data.neg_keep_prob_train
# ============================================================================
data:
  # metadata 中包含 feature_meta / rows / total_num_embeddings
  metadata_path: "data/processed/metadata.json"
  batch_size: 2048
  num_workers: 4
  # valid 独立 worker 配置，避免与 train 同配导致内存压力
  num_workers_valid: 2
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: false
  drop_last: false
  debug: false
  seed: 20260127
  # 仅在 train 且 negative_sampling 非 none 时生效；按 y_ctr=0 负样本随机保留比例
  neg_keep_prob_train: 1.0

sampling:
  # 当前代码仅识别 "none/off/disable/disabled" 为关闭采样；
  # 其他取值都会退化为 keep_prob 模式（按 data.neg_keep_prob_train 下采样）
  negative_sampling: "none"
  

# ============================================================================
# Embedding
# - 会被 merge 到每个 feature 的 model_feature_meta（src/utils/feature_meta.py）
# ============================================================================
embedding:
  # 默认 embedding 维度；可被 embedding_dim_overrides 覆盖
  default_embedding_dim: 8
  # 按特征名覆盖维度，例如 {"f1_110_14": 16}
  embedding_dim_overrides: {}
  # 传递给 nn.EmbeddingBag(mode=...)；当前工程默认使用 "sum"
  mode: "sum"
  # true 时 embedding 参数走 sparse grad，可与 dual_sparse_dense 联动
  sparse_grad: true

# ============================================================================
# Model
# ============================================================================
model:
  name: "base_mmoe"
  # mtl 可选: sharedbottom | mmoe | ple（src/models/build.py）
  mtl: "mmoe"
  # 参与前向/损失的 head 集合
  enabled_heads: ["ctr", "cvr"]
  tasks: ["ctr", "cvr"]
  
  # DeepFM backbone 配置（src/models/backbones/deepfm.py）
  backbone:
    # false: classic DeepFM 路径，支持 wide/fm/deep 显式分解
    use_legacy_pseudo_deepfm: false
    # 输出 ctr/cvr_logit_parts 供训练日志与评估拆解
    return_logit_parts: true
    # 每个任务是否叠加 wide/fm 项（MMoE/SharedBottom 同逻辑）
    per_head_add:
      ctr: { use_wide: true, use_fm: true }
      cvr: { use_wide: false, use_fm: false }
    # deep MLP 结构
    deep_hidden_dims: [128, 64]
    deep_dropout: 0.2
    deep_activation: relu
    deep_use_bn: false
    # FM 二阶项
    fm_enabled: true
    # 当各字段 embedding 维度不一致时，先投影到统一维度再做 FM
    fm_projection_dim: 16
    # backbone 输出维度（供上层 MTL block 输入）
    out_dim: 64
  
  # MMoE 配置（src/models/mtl/mmoe.py）
  mmoe:
    # 共享专家个数（所有任务共用）
    num_experts: 4
    # 每个 expert 的 MLP hidden dims；输出会自动回到 in_dim
    expert_mlp_dims: [128]
    # gate 类型: linear | mlp
    gate_type: "linear"
    # 仅 gate_type=mlp 时生效
    gate_hidden_dims: [32]
    # 旧输入路径: deep_h | emb_concat（未启用 composer 时）
    input: "deep_h"

    # 以下是 composer 可选配置（当前关闭，保留作为模板）
    # add_fm_vec: false
    # add_emb: "none"
    # part_proj_dim: null
    # fusion: "concat"
    # adapter_mlp_dims:
    # norm: "layernorm"

    # expert MLP dropout
    dropout: 0.0
    # true 时在 outputs["aux"]["gates"] 输出每个任务 gate 权重（detach）
    log_gates: true
    # gate 稳定化: 训练时追加 gate_reg_loss（entropy + load-balance KL）
    gate_stabilize:
      enabled: true
      # 数值稳定项，防止 log(0)
      eps: 1.0e-8
      # 熵正则（目标: 提高 gate 熵，减轻 expert collapse）
      entropy_reg_weight: 3.0e-4
      # 负载均衡 KL（目标: 平均路由接近均匀分布）
      load_balance_kl_weight: 3.0e-4
      # 预留日志开关（当前核心统计主要通过 loss_dict/metrics 输出）
      log_stats: true
      # Gate 温度和噪声退火调度（线性退火，与 PLE 对齐）
      # enabled=true: 启用 schedule，在 warmup 期间保持 start 值，之后线性退火到 end 值
      # warm_frac: warmup 阶段占总训练的比例（前 20% 保持初始值）
      # temperature: >1 使 gate softmax 更平滑，<1 更尖锐；训练初期用高温鼓励探索
      # noise_std: 训练时添加到 gate logits 的高斯噪声标准差；初期用噪声防止过早坍缩
      schedule:
        enabled: true
        warm_frac: 0.2
        temperature_start: 1.2
        temperature_end: 1.0
        noise_std_start: 0.03
        noise_std_end: 0.01
  
  # 任务 head（TaskHead）
  heads:
    default:
      mlp_dims: [128]
      dropout: 0.1
      use_bn: false
      activation: "relu"
    ctr: {}
    cvr: {}
  
# ============================================================================
# Optimizer
# ============================================================================
optim:
  # dual_sparse_dense: 稀疏参数(SparseAdam) + 稠密参数(AdamW)
  type: dual_sparse_dense
  dense:
    lr: 0.0006
    weight_decay: 1e-5
    betas: [0.9, 0.999]
    eps: 1.0e-8
  sparse:
    enabled: true
    lr: 0.001
    betas: [0.9, 0.999]
    eps: 1.0e-8
    # false: 若未找到 sparse 参数则直接报错（避免静默降级）
    allow_fallback_if_empty: false
  lr_scheduler:
    enabled: true
    # "dense" 仅调 dense optimizer；"both" 同时调 sparse optimizer
    target: "both"
    # cosine | step（当前配置使用 cosine）
    type: "cosine"
    # 前 warmup_steps 线性升温
    warmup_steps: 5000
    # 若设置则优先于 runtime.max_train_steps 的推导
    total_steps: 80000
    # 最低学习率比例（相对初始 lr）
    min_lr_ratio: 0.1

# ============================================================================
# Loss
# ============================================================================
loss:
  # 非 ESMM 时为 CTR/CVR loss 权重；ESMM 模式下主要由 esmm.lambda_* 控制
  w_ctr: 1.0
  w_cvr: 1.0
  eps: 1.0e-6
  # false: 使用 static_pos_weight；true: 每个 batch 动态估计正样本权重
  pos_weight_dynamic: false
  static_pos_weight:
    ctr: 1
    # ESMM v2 下对应 CTCVR 通道
    ctcvr: 1
  # true 时按 1/neg_keep_prob_train 校正负样本权重
  neg_sample_weight_correction: false
  pos_weight_clip:
    ctr: 10
    ctcvr: 20
  # 正样本权重裁剪 schedule（train loop 动态改写 loss_fn 内部 clip）
  pos_weight_clip_schedule:
    enabled: false
    target: "ctcvr"
    type: "piecewise"
    milestones: [0, 8000]
    values: [300, 30]
  # CTCVR 辅助 focal（仅 ESMM v2 且 warmup 后生效）
  aux_focal:
    enabled: true
    warmup_steps: 8000
    target_head: "ctcvr"
    lambda: 0.05
    gamma: 1.0
    use_alpha: false
    alpha: 0.25
    detach_p_for_weight: true
    compute_fp32: true
    log_components: true

# ============================================================================
# Runtime
# ============================================================================
runtime:
  device: "cuda"
  # Trainer 以 max_train_steps 为主，并按 epochs 切分 epoch 区间
  epochs: 2
  # 训练日志周期；同时作为 mid-epoch 验证周期
  log_every: 3000
  # 仅 CUDA 可用时启用 AMP
  amp: true
  # 梯度冲突诊断（GradConflictSampler + GradientDiagnostics）
  grad_diag_enabled: true
  # null 则回退到 log_every
  grad_diag_every: 1000
  # 至少需要多少任务才做梯度冲突统计
  grad_diag_min_tasks: 2
  # 额外健康指标（label/logit/gate 分布）记录开关
  log_health_metrics: true
  # 训练硬上限；Trainer 要求必须显式给出
  max_train_steps: 80000
  max_valid_steps: null
  grad_clip_norm: 2.0
  seed: 20260127
  # 从现有 ckpt 恢复（会复用 run_dir 并追加日志）
  resume_path: null
  # 训练完成后自动评估（src/eval/run_eval.py）
  auto_eval: true
  auto_eval_split: "valid"
  auto_eval_save_preds: true
  # best | last
  auto_eval_ckpt: "best"
  # 是否每个 epoch 保存 ckpt_last.pt
  save_last: false
  
  # BestSelector（src/train/best_selector.py）
  # strategy=gate: primary 需提升且 aux 不可劣化超过阈值
  best_selection:
    strategy: "gate"
    primary_key: "auc_ctcvr"
    aux_keys: ["auc_ctr", "auc_cvr"]
    # true 则 primary 用移动平均（窗口 ma_window）
    use_primary_ma: false
    ma_window: 5
    # primary 至少提升 tol_primary 才可触发候选更新
    tol_primary: 0.0001
    # aux 允许下降的容忍度（delta >= -tol_aux）
    tol_aux:
      auc_ctr: 0.003
      auc_cvr: 0.008
    # 连续通过 gate 的次数要求
    confirm_times: 1
    # 每次更新 best 后冷却多少次 eval
    cooldown_evals: 0
    # 决策日志写入 train.log + metrics(valid_decision)
    log_decision: true

  # 专家健康诊断（src/utils/expert_health_diag.py）
  # 输出文件: run_dir/expert_health_diag.jsonl
  expert_health_diag:
    enabled: true
    # train 阶段按 global_step 间隔触发
    log_interval: 1000
    # 是否在 valid 结束时额外记录一次
    log_on_valid: true
    utilization:
      enabled: true
      # soft routing: mean_weight < dead_mean_threshold 视为 soft-dead
      dead_mean_threshold: 0.01
      # 可选更严格：要求 p95 也很低（95% 样本权重都 < dead_p95_threshold）
      dead_p95_threshold: 0.01
      dead_require_p95: false
      # rank dominance: top1 极端但 mean_weight 仍近均匀
      rank_dom_top1_threshold: 0.95
      rank_dom_uniform_eps: 0.03
      rank_dom_std_eps: 0.02
      # monopoly: 需同时满足 top1_share + mean_weight
      monopoly_top1_threshold: 0.95
      # null 表示按 max(0.5, 1/K + 0.2) 动态计算
      monopoly_mean_threshold: null
      compute_gini: true
    output_stats:
      enabled: true
      per_expert_stats: true
      cross_expert_similarity: true
      # 专家输出余弦相似度告警阈值
      similarity_alert_threshold: 0.95
    gradient:
      enabled: true
      per_expert_grad_norm: true
      # 梯度消失/爆炸诊断阈值
      vanish_threshold: 1.0e-6
      explode_threshold: 100.0
    type_specialization:
      enabled: true
      aggregate_by_type: true
      cross_task_specialization: true
    aligner:
      enabled: true
      log_scale_stats: true
      # 预留: 分布变化日志（当前默认关闭）
      log_distribution_change: false
